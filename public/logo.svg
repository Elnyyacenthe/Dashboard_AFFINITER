<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="heart-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3d8b"/>
      <stop offset="100%" stop-color="#a020f0"/>
    </linearGradient>
    <linearGradient id="flame-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="40%" stop-color="#ffb648"/>
      <stop offset="100%" stop-color="#ff5e3a"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3d8b"/>
      <stop offset="100%" stop-color="#a020f0"/>
    </linearGradient>
  </defs>

  <!-- Cœur -->
  <g transform="translate(8, 14)">
    <path
      d="M26 50
         C 26 50, 4 36, 4 18
         A 14 14 0 0 1 26 8
         A 14 14 0 0 1 48 18
         C 48 36, 26 50, 26 50 Z"
      fill="url(#heart-grad)"
      stroke="#ff3d8b"
      stroke-width="1.5"
    />
    <!-- Flamme dans le cœur -->
    <path
      d="M26 38
         C 22 33, 20 28, 23 22
         C 24 25, 26 24, 26 22
         C 26 18, 30 16, 28 12
         C 32 13, 33 18, 32 22
         C 33 21, 34 21, 34 24
         C 34 30, 30 36, 26 38 Z"
      fill="url(#flame-grad)"
    />
  </g>

  <!-- Wordmark Affiniter -->
  <text
    x="78" y="52"
    font-family="'Poppins', 'Segoe UI', system-ui, sans-serif"
    font-size="38"
    font-weight="800"
    letter-spacing="-0.5"
    fill="url(#text-grad)"
  >Affiniter</text>
</svg>
